[tox]
env_list =
    ruff
    py{310,311,312,313,314}-dj52
    py{312,313,314}-dj60

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314

[testenv]
package = editable
passenv =
    CI
deps =
    coverage[toml]
    dj52: Django>=5.2,<5.3
    dj52: djangorestframework>=3.16
    dj60: Django>=6.0,<6.1
    dj60: djangorestframework>=3.17
    djmain: https://github.com/django/django/tarball/main
    djmain: https://github.com/encode/django-rest-framework/tarball/master
setenv =
    DJANGO_SETTINGS_MODULE=settings
commands =
    coverage run tests/manage.py test tests {posargs}
    coverage report -m --skip-covered

[testenv:ruff]
skip_install = true
deps =
    ruff == 0.9.6
commands =
    ruff check authlink tests
    ruff format --check authlink tests
